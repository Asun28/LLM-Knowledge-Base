name: ci

# Cycle 34 (2026-04-25): bootstrap CI per comprehensive-review Finding 2.
# Trigger scope narrowed (NEW-Q16): push only on main; pull_request on every PR.
# This avoids burning CI minutes on throwaway feature-branch pushes before they
# become PRs.
on:
  push:
    branches: [main]
  pull_request: {}

# Principle of least privilege per threat-model T1: explicit read-all so
# fork-PR tokens cannot escalate. NO secrets.* references; NO pull_request_target.
permissions: read-all

# Concurrency control per NEW-Q23: cancel superseded runs on the same ref to
# save ~50% CI minutes for active PRs that get rebased / amended frequently.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    # Cycle 36 STRICT GATE — `[ubuntu-latest, windows-latest]` matrix with
    # `continue-on-error: true` DROPPED from the pytest step. Closes the
    # cycle-36 BACKLOG strict-gate + cross-OS portability entries.
    #
    # Three-commit sequence on cycle-36 PR per Step-5 Q16/Q21:
    #   commit 1 — probe — markers + ubuntu single-OS, soft-fail still on
    #   commit 2 — fix — apply skipif markers from probe results
    #   commit 3 — strict-gate — matrix + drop continue-on-error (this state)
    #
    # Cycle 34 history: bootstrapped CI on `windows-latest` because the
    # existing test suite was authored on Windows and assumed Windows path
    # semantics in ~6 tests. Cycle 36 added `requires_real_api_key()`
    # skipif markers (10 SDK-using tests), `sys.platform != "win32"` skipif
    # markers (Windows-only tests), kb.config.WIKI_DIR mirror-rebind for
    # cycle-19 L1 snapshot-binding hazard, and pytest-timeout 120s default
    # to fail fast on hangs (was silent KeyboardInterrupt under cycle-23
    # multiprocessing spawn-bootstrap on GHA).
    #
    # Dummy ANTHROPIC_API_KEY set below so tests that instantiate the
    # Anthropic SDK (capture.py / mcp_core.py kb_capture wrapper) don't
    # error with "Could not resolve authentication method" — tests mock
    # the actual API calls. Cycle 36 AC6 helper at `tests/_helpers/api_key.py`
    # gates tests that would risk a real API call.
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    env:
      ANTHROPIC_API_KEY: sk-ant-dummy-key-for-ci-tests-only
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python 3.12 with pip cache
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install package + ALL feature extras + dev tools
        # cycle 34 fix-after-CI-failure: tests cover ALL feature surfaces
        # (formats / augment / hybrid / eval) so CI must install every extra.
        # `[dev]` alone leaves nbformat / httpx / trafilatura / model2vec /
        # sqlite_vec / ragas missing → collection errors on the test files
        # that import the corresponding feature modules. Net: CI install =
        # full test surface.
        run: pip install -e '.[dev,formats,augment,hybrid,eval]'

      - name: Install CI tooling (build, twine, pip-audit)
        # AC50 / NEW-Q13: dedicated step keeps `[dev]` lean for actual developers
        # while making CI tooling explicit. `pip-audit` is also in `[dev]` per
        # AC2, this redundant install ensures it's available even if a future
        # cycle removes it from `[dev]`.
        run: pip install build twine pip-audit

      - name: Ruff check
        run: ruff check src/ tests/

      - name: Pytest collection (smoke check)
        run: python -m pytest --collect-only -q

      - name: Pytest full suite (strict — cycle 36 closure)
        # Cycle 36 strict-gate: `continue-on-error: true` DROPPED. Closes
        # the cycle-36 strict-gate BACKLOG entry. Marker fixes that closed
        # the previously-flaky classes (commit 1+2 of this PR):
        #   AC2 — skipif `os.environ.get("CI") == "true"` on the cycle-23
        #         multiprocessing spawn-hang test (1.03s local pass; GHA
        #         Windows runner hangs at popen_spawn_win32.py:112).
        #   AC3 — `pytest-timeout = 120` default + `pytest-timeout>=2.3`
        #         in [dev] extras catches future hangs at 2-min boundary
        #         instead of GHA's 6-hour silent kill.
        #   AC5 — mirror-rebind `kb.config.WIKI_DIR` snapshot in cycle 10
        #         quality tests + `kb.mcp.quality.WIKI_DIR` in MCP phase 2
        #         tests (cycle-19 L1 snapshot pattern).
        #   AC6 — `tests/_helpers/api_key.py::requires_real_api_key()`
        #         predicate gates SDK-using tests on dummy CI key.
        #   AC7 — wall-clock retry_after tolerance widened to <= 3601
        #         (frozen-clock variant stays exact == 3600 per Q11).
        #   AC11 — anti-Windows skipif markers on Windows-only tests
        #         (backslash semantics, drive-letter abspath); anti-POSIX
        #         skipif on Windows-helper tests; cycle-37 BACKLOG tracks
        #         the deeper POSIX symlink security gap.
        run: python -m pytest -q

      - name: Pip resolver check (soft-fail per cycle 34 T5)
        # T5 mitigation: three known conflicts (arxiv/requests, crawl4ai/lxml,
        # instructor/rich) would fail strict pip check. continue-on-error is on
        # THIS STEP ONLY (verified by cycle 34 Step-11 grep) — it does NOT
        # propagate to ruff/pytest/pip-audit/build steps.
        run: pip check
        continue-on-error: true

      - name: Pip-audit (live environment with documented narrow-role exceptions)
        # cycle 34 fix-after-CI-failure-4: pip-audit's `--no-deps` flag does
        # NOT prevent its underlying `pip install --dry-run` resolution step
        # — it only suppresses transitive auditing.  The dry-run still trips
        # cycle-22 L1's ResolutionImpossible on arxiv 2.4.1 vs requests 2.33.0.
        # Fix: drop `-r requirements.txt` and audit the LIVE installed env
        # instead.  Since the previous step installed every extra (`[dev,
        # formats,augment,hybrid,eval]`), the live env IS the audit surface,
        # and pip-audit just walks `pip list` without spinning up a fresh
        # venv install.  Audit coverage equivalent; no resolution conflict.
        # The four --ignore-vuln IDs match SECURITY.md's "Known Advisories"
        # table 1:1.  ANY new CVE on these or other packages will fail this step.
        # Cycle 36 fix — use bash backslash line-continuation (works on both
        # ubuntu-latest bash and windows-latest pwsh shell-parsing modes).
        # Previous PowerShell backtick `\`` worked on windows-latest but
        # ubuntu-latest bash treats backtick as command-substitution start
        # and misparsed the --ignore-vuln args as commands.
        run: |
          pip-audit \
            --ignore-vuln=CVE-2025-69872 \
            --ignore-vuln=GHSA-xqmj-j6mv-4862 \
            --ignore-vuln=CVE-2026-3219 \
            --ignore-vuln=CVE-2026-6587

      - name: Build distribution + twine check
        # AC15: catches malformed pyproject.toml (cycle 34 fixed readme pointer)
        # and validates package metadata before any future PyPI publish.
        run: |
          python -m build
          python -m twine check dist/*
